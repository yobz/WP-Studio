name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite, mbstring, bcmath, intl, curl
          coverage: none

      - uses: ramsey/composer-install@v3
        with:
          working-directory: backend

      - run: cp .env.example .env
      - run: php artisan key:generate
      - run: ./vendor/bin/pint --test
      - run: php artisan test
