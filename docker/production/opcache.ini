; Standard production OPcache settings — compiled bytecode cached in
; shared memory instead of re-parsed from disk on every request.
; validate_timestamps=0 means a deploy MUST restart PHP-FPM to pick up
; new code (Railway does this automatically on every deploy; a bare
; `docker compose restart` would be needed anywhere else) — the
; performance trade-off standard production Laravel deployments accept.
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.validate_timestamps=0
opcache.save_comments=1
